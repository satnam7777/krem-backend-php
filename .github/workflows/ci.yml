name: CI

on:
  push:
  pull_request:

jobs:
  phpunit:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: krema_central_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d krema_central_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql, mbstring, intl, zip
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Generate APP_KEY
        run: php artisan key:generate --force
        env:
          APP_ENV: testing
          APP_DEBUG: "true"
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: krema_central_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          TENANT_DB_HOST: 127.0.0.1
          TENANT_DB_PORT: 5432
          TENANT_DB_USERNAME: postgres
          TENANT_DB_PASSWORD: postgres
          TENANT_DB_PREFIX: krema_tenant_

      - name: Run tests
        run: vendor/bin/phpunit
        env:
          APP_ENV: testing
          APP_DEBUG: "true"
          LOG_CHANNEL: single
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: krema_central_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          TENANT_DB_HOST: 127.0.0.1
          TENANT_DB_PORT: 5432
          TENANT_DB_USERNAME: postgres
          TENANT_DB_PASSWORD: postgres
          TENANT_DB_PREFIX: krema_tenant_
          CACHE_DRIVER: array
          QUEUE_CONNECTION: sync
